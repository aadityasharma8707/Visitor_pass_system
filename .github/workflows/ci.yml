name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:5.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})' || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Run backend migrations (best-effort)
        working-directory: backend
        run: node src/scripts/runMigrations.js || true
      - name: Run backend tests
        working-directory: backend
        run: npm run test:ci

  frontend-build:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Archive frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build backend Docker image
        run: |
          docker build -t backend:rc1 -f backend/Dockerfile backend
